enableCORS          = false
enableXsrfProtection = true

[theme]
base                     = "dark"
primaryColor             = "#c8ff00"
backgroundColor          = "#141418"
secondaryBackgroundColor = "#1c1c20"
textColor                = "#e8e6e0"
font                     = "sans serif"
